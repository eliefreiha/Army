<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1c2018">
<title>TOPOPROG — Military Survey Computer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#191d16; --bg2:#22281d; --grid:rgba(140,158,108,.10);
  --panel:#f3eedd; --panel-ink:#22271b; --panel-soft:#e7dfc6;
  --olive:#5d6b3c; --olive-d:#3c472a; --cedar:#3f8a3a; --cedar-d:#2c6a2a;
  --bronze:#c69a3f; --bronze-d:#9a7528; --bronze-l:#e3c267;
  --line:#cdbf97; --muted:#8e9a78; --bad:#c4502e; --field-ink:#d8e0c4;
  --shadow:0 1px 0 rgba(255,255,255,.5) inset,0 8px 26px -14px rgba(0,0,0,.6);
  --disp:"Oswald","Arial Narrow",Impact,sans-serif;
  --mono:"Roboto Mono",ui-monospace,Menlo,Consolas,monospace;
  --body:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
html[data-night="1"]{
  --bg:#000; --bg2:#0a0503; --grid:rgba(255,40,30,.07);
  --panel:#180605; --panel-ink:#ff5a44; --panel-soft:#220807;
  --olive:#5a1410; --olive-d:#2a0907; --cedar:#a8281b; --cedar-d:#7c1c12;
  --bronze:#ff5a44; --bronze-d:#a8281b; --bronze-l:#ff7a66;
  --line:#5a1410; --muted:#9a3324; --field-ink:#ff6650;
  --shadow:0 0 0 1px rgba(255,40,30,.12) inset,0 8px 26px -16px #000;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:var(--body); color:var(--field-ink); background:var(--bg);
  background-image:
    linear-gradient(var(--grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid) 1px,transparent 1px),
    radial-gradient(120% 80% at 50% -10%, var(--bg2), var(--bg) 60%);
  background-size:34px 34px,34px 34px,100% 100%;
  -webkit-text-size-adjust:100%; min-height:100dvh;
}
.wrap{max-width:560px;margin:0 auto;padding:0 14px calc(28px + env(safe-area-inset-bottom))}

/* ---------- header ---------- */
header{padding:18px 0 12px;display:flex;align-items:center;gap:12px}
.emblem{width:46px;height:46px;flex:none;filter:drop-shadow(0 3px 6px rgba(0,0,0,.5))}
html[data-night="1"] .emblem{filter:grayscale(1) sepia(1) hue-rotate(-30deg) saturate(6) brightness(.8)}
.brand h1{font-family:var(--disp);font-weight:700;letter-spacing:.16em;
  font-size:25px;margin:0;line-height:1;color:var(--bronze-l);text-transform:uppercase}
.brand .sub{font-family:var(--mono);font-size:10px;letter-spacing:.18em;
  color:var(--muted);text-transform:uppercase;margin-top:4px}
.hbtns{margin-left:auto;display:flex;gap:8px;flex:none}
.icon-btn{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.05em;
  background:transparent;border:1px solid var(--line);color:var(--field-ink);
  border-radius:9px;padding:8px 9px;cursor:pointer;line-height:1}
.icon-btn:active{transform:translateY(1px)}

/* ---------- mil system switch ---------- */
.milsys{display:flex;border:1px solid var(--line);border-radius:11px;overflow:hidden;
  margin:2px 0 16px;background:var(--bg2)}
.milsys button{flex:1;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.04em;
  padding:11px 8px;border:0;background:transparent;color:var(--muted);cursor:pointer;text-transform:uppercase}
.milsys button small{display:block;font-weight:400;font-size:9.5px;letter-spacing:.12em;opacity:.7;margin-top:3px}
.milsys button[aria-pressed="true"]{background:linear-gradient(180deg,var(--cedar),var(--cedar-d));color:#fff}
html[data-night="1"] .milsys button[aria-pressed="true"]{color:#fff}

/* ---------- tabs ---------- */
.tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.tab{font-family:var(--disp);font-weight:600;font-size:14px;letter-spacing:.06em;text-transform:uppercase;
  padding:12px 8px;border:1px solid var(--line);background:var(--bg2);color:var(--field-ink);
  border-radius:12px;cursor:pointer;display:flex;flex-direction:column;align-items:flex-start;gap:3px;text-align:left}
.tab .ar{font-family:var(--body);font-weight:400;font-size:11px;letter-spacing:0;color:var(--muted);direction:rtl}
.tab[aria-selected="true"]{border-color:var(--bronze);
  background:linear-gradient(180deg,#2c331f,#222820);box-shadow:0 0 0 1px var(--bronze) inset}
html[data-night="1"] .tab[aria-selected="true"]{background:#1a0605}
.tab[aria-selected="true"] .lbl{color:var(--bronze-l)}

/* ---------- card ---------- */
.card{background:var(--panel);color:var(--panel-ink);border-radius:16px;padding:16px 15px 18px;
  box-shadow:var(--shadow);border:1px solid var(--line)}
.card h2{font-family:var(--disp);font-weight:600;text-transform:uppercase;letter-spacing:.07em;
  font-size:17px;margin:0 0 2px;color:var(--olive-d)}
html[data-night="1"] .card h2{color:var(--bronze)}
.card .desc{font-size:12.5px;color:#6b6b58;margin:0 0 14px;line-height:1.45}
html[data-night="1"] .card .desc{color:var(--muted)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.03em;
  color:var(--olive-d);display:flex;align-items:baseline;gap:6px}
html[data-night="1"] .field label{color:var(--bronze)}
.field label .hint{font-family:var(--body);font-weight:400;font-size:10px;color:#8a8a72;letter-spacing:0}
.field input{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--panel-ink);
  background:#fff;border:1px solid var(--line);border-radius:9px;padding:11px 11px;width:100%;outline:none}
html[data-night="1"] .field input{background:#250908;color:#ff8a78;border-color:#5a1410}
.field input:focus{border-color:var(--cedar);box-shadow:0 0 0 3px rgba(63,138,58,.18)}
.field input::placeholder{color:#b9b39c}

.subhead{grid-column:1/-1;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--bronze-d);margin:8px 0 -2px;display:flex;align-items:center;gap:8px}
.subhead::after{content:"";height:1px;flex:1;background:var(--line)}

.go{width:100%;margin-top:16px;font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:.1em;
  text-transform:uppercase;color:#fff;border:0;border-radius:11px;padding:14px;cursor:pointer;
  background:linear-gradient(180deg,var(--cedar),var(--cedar-d));box-shadow:0 6px 16px -8px var(--cedar-d)}
.go:active{transform:translateY(1px)}

/* ---------- result ---------- */
.result{margin-top:16px;display:none}
.result.show{display:block}
.err{margin-top:14px;display:none;font-family:var(--mono);font-size:12.5px;color:#fff;
  background:var(--bad);border-radius:9px;padding:10px 12px;line-height:1.4}
.err.show{display:block}
.readout{display:grid;gap:8px;grid-template-columns:1fr 1fr}
.ro{background:var(--panel-soft);border:1px solid var(--line);border-radius:10px;padding:10px 11px}
.ro.full{grid-column:1/-1}
.ro .k{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--olive-d)}
html[data-night="1"] .ro .k{color:var(--bronze)}
.ro .v{font-family:var(--mono);font-size:21px;font-weight:700;color:var(--panel-ink);margin-top:3px}
html[data-night="1"] .ro .v{color:#ff8a78}
.ro .u{font-size:11px;font-weight:400;color:#8a8a72}

.viz{display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;margin:4px 0 14px}
.viz svg{background:var(--panel-soft);border:1px solid var(--line);border-radius:12px}

footer{margin-top:22px;text-align:center;font-family:var(--mono);font-size:10.5px;
  letter-spacing:.12em;color:var(--muted);text-transform:uppercase;line-height:1.7}
footer .cedar{color:var(--cedar)}
html[data-night="1"] footer .cedar{color:var(--bronze)}
@media (max-width:380px){.brand h1{font-size:21px}.tab{font-size:12.5px}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img class="emblem" id="emblem" alt="Lebanese Army emblem">
    <div class="brand">
      <h1>Topoprog</h1>
      <div class="sub">Topographic Survey Computer</div>
    </div>
    <div class="hbtns">
      <button class="icon-btn" id="nightBtn" title="Night / field mode">NIGHT</button>
    </div>
  </header>

  <div class="milsys" role="group" aria-label="Millième system">
    <button id="sysW" aria-pressed="true">Western millième<small>6400 / circle</small></button>
    <button id="sysE" aria-pressed="false">Eastern millième<small>6000 / circle</small></button>
  </div>

  <div class="tabs" role="tablist">
    <button class="tab" role="tab" data-mod="gisdist" aria-selected="true">
      <span class="lbl">Gisement · Distance</span><span class="ar">الاتجاه والمسافة</span></button>
    <button class="tab" role="tab" data-mod="rayon" aria-selected="false">
      <span class="lbl">Rayonnement</span><span class="ar">الإشعاع</span></button>
    <button class="tab" role="tab" data-mod="inter" aria-selected="false">
      <span class="lbl">Intersection</span><span class="ar">التقاطع</span></button>
    <button class="tab" role="tab" data-mod="relev" aria-selected="false">
      <span class="lbl">Relèvement</span><span class="ar">الرصد العكسي</span></button>
  </div>

  <div id="mount"></div>

  <footer>
    By 1LT Richard Barakat &nbsp;·&nbsp; <span class="cedar">جيش لبنان</span><br>
    Web edition — works offline
  </footer>
</div>

<script>
/* ====================== TOPOPROG — survey core ====================== */
"use strict";
const App = {
  full: 6400,                       // 6400 western / 6000 eastern
  get half(){ return this.full/2; },
  mod: "gisdist",
  night: false,
};

/* unit helpers: a full circle = App.full millièmes = 2π rad */
const mil2rad = m => m * Math.PI / App.half;          // App.full -> 2π
const rad2mil = r => r * App.half / Math.PI;
const norm    = m => ((m % App.full) + App.full) % App.full;
const num = v => { const x = parseFloat(String(v).replace(",", ".")); 
                   if (!isFinite(x)) throw new Error("field"); return x; };
const fmt = (x,d=2) => (isFinite(x) ? x.toLocaleString("en-US",
              {minimumFractionDigits:d,maximumFractionDigits:d}) : "—");

/* ---------- the four computations ---------- */
// 1) bearing + distance  station S -> point A
function calcGisDist(v){
  const Xs=num(v.Xs),Ys=num(v.Ys),Xa=num(v.Xa),Ya=num(v.Ya);
  const dist = Math.hypot(Xa-Xs, Ya-Ys);
  let g = Math.atan2(Xa-Xs, Ya-Ys);            // clockwise from +Y (North)
  if (g<0) g += 2*Math.PI;
  return { dist, gis: norm(rad2mil(g)) };
}
// 2) radiation: from A by gisement G, slope dist D, site Si -> new point S
function calcRayon(v){
  const Xa=num(v.Xa),Ya=num(v.Ya),Za=num(v.Za);
  const G=norm(num(v.G)), D=num(v.D), Si=num(v.Si);
  const Grad=mil2rad(G), Sr=mil2rad(Si);
  const Dh = D*Math.cos(Sr);                    // horizontal distance
  const dz = Dh*Math.tan(Sr);                   // signed elevation diff
  return {
    Xs: Xa + Dh*Math.sin(Grad),
    Ys: Ya + Dh*Math.cos(Grad),
    Zs: Za + dz,
    Dh, gis:G
  };
}
// 3) intersection of two bearing-rays from A (Ga) and B (Gb)
function calcInter(v){
  const Xa=num(v.Xa),Ya=num(v.Ya),Xb=num(v.Xb),Yb=num(v.Yb);
  const ga=mil2rad(norm(num(v.Ga))), gb=mil2rad(norm(num(v.Gb)));
  const dA=[Math.sin(ga),Math.cos(ga)], dB=[Math.sin(gb),Math.cos(gb)];
  const den=dA[0]*dB[1]-dA[1]*dB[0];
  if (Math.abs(den)<1e-12) throw new Error("parallel");
  const t=((Xb-Xa)*dB[1]-(Yb-Ya)*dB[0])/den;
  return { Xs:Xa+t*dA[0], Ys:Ya+t*dA[1] };
}
// 4) resection (Pothénot) — faithful port of original algorithm
function calcRelev(v){
  const Ax=num(v.Ax),Ay=num(v.Ay),Bx=num(v.Bx),By=num(v.By),Cx=num(v.Cx),Cy=num(v.Cy);
  const a=mil2rad(num(v.A1)), b=mil2rad(num(v.A2));   // A1=α (at A–B), A2=β (at A–C)
  const ta=Math.tan(a), tb=Math.tan(b);
  const k1 = ((((Ay-Cy)*(1/ta)+(Cx-Bx))*tb-(Ay-By)) /
              (((Ax-Cx)*(1/ta)+(By-Cy))*tb-(Ax-Bx)));
  const k2 = (tb+k1)/(1-tb*k1);
  const Ys = ((((Bx-Ax)*k2)-(By-Ay))/(k2-k1))+Ax;
  const Xs = ((Ys-Ax)*k1)+Ay;
  return { Xs, Ys };
}

/* ====================== visualizations ====================== */
// azimuth dial graduated in millièmes; needle to bearing
function dial(gis){
  const S=170,c=S/2,R=70, full=App.full;
  const ticks=[]; const step=full/64;
  for(let i=0;i<64;i++){
    const m=i*step, big=(i%8===0), mid=(i%4===0);
    const a=(m/full)*2*Math.PI, len=big?12:(mid?8:4);
    const x1=c+Math.sin(a)*R, y1=c-Math.cos(a)*R;
    const x2=c+Math.sin(a)*(R-len), y2=c-Math.cos(a)*(R-len);
    ticks.push(`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="var(--olive-d)" stroke-width="${big?1.6:.8}" opacity="${big?.9:.5}"/>`);
    if(big){const lx=c+Math.sin(a)*(R-26),ly=c-Math.cos(a)*(R-26);
      ticks.push(`<text x="${lx.toFixed(1)}" y="${(ly+3).toFixed(1)}" font-size="8.5" font-family="var(--mono)" fill="var(--olive-d)" text-anchor="middle" opacity=".8">${m}</text>`);}
  }
  const a=(norm(gis)/full)*2*Math.PI;
  const nx=c+Math.sin(a)*(R-14), ny=c-Math.cos(a)*(R-14);
  const tx=c-Math.sin(a)*22, ty=c+Math.cos(a)*22;
  return `<svg viewBox="0 0 ${S} ${S}" width="156" height="156" role="img" aria-label="bearing dial">
    <circle cx="${c}" cy="${c}" r="${R}" fill="none" stroke="var(--bronze-d)" stroke-width="1.4"/>
    <circle cx="${c}" cy="${c}" r="${R-18}" fill="none" stroke="var(--line)" stroke-width=".7"/>
    ${ticks.join("")}
    <line x1="${tx.toFixed(1)}" y1="${ty.toFixed(1)}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="var(--cedar)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="${nx.toFixed(1)}" cy="${ny.toFixed(1)}" r="4" fill="var(--cedar)"/>
    <circle cx="${c}" cy="${c}" r="3.4" fill="var(--bronze-d)"/>
    <text x="${c}" y="${c-R+4}" font-size="9" font-family="var(--mono)" fill="var(--cedar-d)" text-anchor="middle" font-weight="700">N</text>
    <text x="${c}" y="${c+2}" font-size="15" font-family="var(--mono)" font-weight="700" fill="var(--olive-d)" text-anchor="middle">${Math.round(norm(gis))}</text>
  </svg>`;
}
// plan view of points (x=Easting →, y=Northing ↑)
function plot(points){
  const S=170,pad=22;
  const xs=points.map(p=>p.x), ys=points.map(p=>p.y);
  let minx=Math.min(...xs),maxx=Math.max(...xs),miny=Math.min(...ys),maxy=Math.max(...ys);
  let sx=maxx-minx||1, sy=maxy-miny||1, sp=Math.max(sx,sy)*1.25;
  const cx=(minx+maxx)/2, cy=(miny+maxy)/2;
  minx=cx-sp/2; maxx=cx+sp/2; miny=cy-sp/2; maxy=cy+sp/2;
  const X=v=>pad+((v-minx)/(maxx-minx))*(S-2*pad);
  const Y=v=>S-pad-((v-miny)/(maxy-miny))*(S-2*pad);
  let g="";
  for(let i=0;i<=4;i++){const gx=pad+i*(S-2*pad)/4;
    g+=`<line x1="${gx}" y1="${pad}" x2="${gx}" y2="${S-pad}" stroke="var(--line)" stroke-width=".5" opacity=".6"/>
        <line x1="${pad}" y1="${gx}" x2="${S-pad}" y2="${gx}" stroke="var(--line)" stroke-width=".5" opacity=".6"/>`;}
  let lines="";
  const st=points.find(p=>p.kind==="station"), res=points.find(p=>p.kind==="result");
  points.forEach(p=>{ if(p.kind!=="result"&&res)
    lines+=`<line x1="${X(p.x)}" y1="${Y(p.y)}" x2="${X(res.x)}" y2="${Y(res.y)}" stroke="var(--bronze)" stroke-width="1" stroke-dasharray="3 3" opacity=".8"/>`;});
  if(st&&res&&!points.some(p=>p.kind==="result")===false){}
  let marks="";
  points.forEach(p=>{
    const col=p.kind==="result"?"var(--cedar)":(p.kind==="station"?"var(--bronze-d)":"var(--olive)");
    const r=p.kind==="result"?5:4;
    marks+=`<circle cx="${X(p.x)}" cy="${Y(p.y)}" r="${r}" fill="${col}" stroke="#fff" stroke-width="1"/>
            <text x="${X(p.x)+7}" y="${Y(p.y)+3}" font-size="9" font-family="var(--mono)" font-weight="700" fill="var(--olive-d)">${p.name}</text>`;
  });
  return `<svg viewBox="0 0 ${S} ${S}" width="156" height="156" role="img" aria-label="plan view">
    <rect x="${pad}" y="${pad}" width="${S-2*pad}" height="${S-2*pad}" fill="none" stroke="var(--bronze-d)" stroke-width="1"/>
    ${g}${lines}${marks}
    <text x="${S-pad}" y="${S-pad+14}" font-size="8" font-family="var(--mono)" fill="var(--muted)" text-anchor="end">E →</text>
    <text x="${pad-14}" y="${pad+4}" font-size="8" font-family="var(--mono)" fill="var(--muted)">N↑</text>
  </svg>`;
}

/* ====================== module definitions ====================== */
const G_HINT = ()=>`millièmes 0–${App.full}`;
const MODULES = {
  gisdist:{
    title:"Gisement & Distance", desc:"Grid bearing and horizontal distance from a station S to a point A.",
    sections:[
      {head:"Station S",fields:[["Xs","Xs","Easting"],["Ys","Ys","Northing"]]},
      {head:"Point A",fields:[["Xa","Xa","Easting"],["Ya","Ya","Northing"]]},
    ],
    run(v){const r=calcGisDist(v);return{
      readouts:[["Distance",fmt(r.dist),"m",true],["Gisement S→A",fmt(r.gis),"mil",true]],
      viz:dial(r.gis)+plot([{name:"S",x:num(v.Xs),y:num(v.Ys),kind:"station"},
                            {name:"A",x:num(v.Xa),y:num(v.Ya),kind:"result"}])
    };}
  },
  rayon:{
    title:"Rayonnement", desc:"Compute a new point S from a known station A given the bearing, slope distance and site (vertical) angle.",
    sections:[
      {head:"Station A",fields:[["Xa","Xa","Easting"],["Ya","Ya","Northing"],["Za","Za","Elevation"]]},
      {head:"Observation A→S",fields:[["G","Gisement",G_HINT()],["D","Distance","slope, m"],["Si","Site","vert. mil"]]},
    ],
    run(v){const r=calcRayon(v);return{
      readouts:[["Xs",fmt(r.Xs),"",true],["Ys",fmt(r.Ys),"",true],
                ["Zs",fmt(r.Zs),"",false],["Horiz. dist",fmt(r.Dh),"m",false]],
      viz:dial(r.gis)+plot([{name:"A",x:num(v.Xa),y:num(v.Ya),kind:"station"},
                            {name:"S",x:r.Xs,y:r.Ys,kind:"result"}])
    };}
  },
  inter:{
    title:"Intersection", desc:"Locate a point S sighted from two known stations A and B by their grid bearings.",
    sections:[
      {head:"Station A",fields:[["Xa","Xa","Easting"],["Ya","Ya","Northing"]]},
      {head:"Station B",fields:[["Xb","Xb","Easting"],["Yb","Yb","Northing"]]},
      {head:"Bearings",fields:[["Ga","Ga (A→S)",G_HINT()],["Gb","Gb (B→S)",G_HINT()]]},
    ],
    run(v){const r=calcInter(v);return{
      readouts:[["Xs",fmt(r.Xs),"",true],["Ys",fmt(r.Ys),"",true]],
      viz:plot([{name:"A",x:num(v.Xa),y:num(v.Ya),kind:"ref"},
                {name:"B",x:num(v.Xb),y:num(v.Yb),kind:"ref"},
                {name:"S",x:r.Xs,y:r.Ys,kind:"result"}])
    };}
  },
  relev:{
    title:"Relèvement", desc:"Resection — find the observer's position S from three known points A, B, C and two measured angles α (A–B) and β (A–C).",
    sections:[
      {head:"Point A",fields:[["Ax","Xa","Easting"],["Ay","Ya","Northing"]]},
      {head:"Point B",fields:[["Bx","Xb","Easting"],["By","Yb","Northing"]]},
      {head:"Point C",fields:[["Cx","Xc","Easting"],["Cy","Yc","Northing"]]},
      {head:"Observed angles",fields:[["A1","α  (A–B)",G_HINT()],["A2","β  (A–C)",G_HINT()]]},
    ],
    run(v){const r=calcRelev(v);return{
      readouts:[["Xs",fmt(r.Xs),"",true],["Ys",fmt(r.Ys),"",true]],
      viz:plot([{name:"A",x:num(v.Ax),y:num(v.Ay),kind:"ref"},
                {name:"B",x:num(v.Bx),y:num(v.By),kind:"ref"},
                {name:"C",x:num(v.Cx),y:num(v.Cy),kind:"ref"},
                {name:"S",x:r.Xs,y:r.Ys,kind:"result"}])
    };}
  }
};

/* ====================== rendering ====================== */
const mount=document.getElementById("mount");
function renderModule(){
  const m=MODULES[App.mod];
  let body="";
  m.sections.forEach(sec=>{
    body+=`<div class="subhead">${sec.head}</div>`;
    sec.fields.forEach(f=>{
      const[k,lab,hint]=f;
      body+=`<div class="field"><label>${lab}${hint?` <span class="hint">${hint}</span>`:""}</label>
        <input inputmode="decimal" autocomplete="off" data-k="${k}" placeholder="0.00"></div>`;
    });
  });
  mount.innerHTML=`<div class="card">
    <h2>${m.title}</h2><p class="desc">${m.desc}</p>
    <div class="grid2">${body}</div>
    <button class="go" id="goBtn">Calculate</button>
    <div class="err" id="err"></div>
    <div class="result" id="res"></div>
  </div>`;
  document.getElementById("goBtn").addEventListener("click",doCalc);
  mount.querySelectorAll("input").forEach(inp=>inp.addEventListener("keydown",e=>{if(e.key==="Enter")doCalc();}));
}
function readForm(){const v={};mount.querySelectorAll("input").forEach(i=>v[i.dataset.k]=i.value.trim());return v;}
function doCalc(){
  const err=document.getElementById("err"),res=document.getElementById("res");
  err.classList.remove("show"); res.classList.remove("show");
  let out; try{ out=MODULES[App.mod].run(readForm()); }
  catch(e){ err.textContent = e.message==="parallel"
      ? "The two bearings are parallel — no intersection. Check Ga and Gb."
      : "Enter valid numbers in every field."; err.classList.add("show"); return; }
  const ro=out.readouts.map(r=>`<div class="ro ${r[3]?"":""}"><div class="k">${r[0]}</div>
      <div class="v">${r[1]}${r[2]?` <span class="u">${r[2]}</span>`:""}</div></div>`).join("");
  res.innerHTML=`<div class="viz">${out.viz}</div><div class="readout">${ro}</div>`;
  res.classList.add("show");
  res.scrollIntoView({behavior:"smooth",block:"nearest"});
}

/* ====================== controls ====================== */
function setSystem(full){
  App.full=full;
  sysW.setAttribute("aria-pressed", full===6400);
  sysE.setAttribute("aria-pressed", full===6000);
  try{localStorage.setItem("tp_full",full);}catch(e){}
  renderModule();
}
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
  App.mod=t.dataset.mod;
  document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-selected",x===t));
  renderModule();
}));
const sysW=document.getElementById("sysW"),sysE=document.getElementById("sysE");
sysW.addEventListener("click",()=>setSystem(6400));
sysE.addEventListener("click",()=>setSystem(6000));
const nightBtn=document.getElementById("nightBtn");
function setNight(on){App.night=on;document.documentElement.dataset.night=on?"1":"0";
  nightBtn.textContent=on?"DAY":"NIGHT";try{localStorage.setItem("tp_night",on?"1":"0");}catch(e){}}
nightBtn.addEventListener("click",()=>setNight(!App.night));

/* emblem + restore prefs */
document.getElementById("emblem").src="data:image/png;base64,"+document.getElementById("emblemData").textContent.trim();
try{ if(localStorage.getItem("tp_full")==="6000")setSystem(6000);
     if(localStorage.getItem("tp_night")==="1")setNight(true); }catch(e){}
renderModule();
</script>
